            .carta-panel .carousel-perspective-wrapper { min-height: clamp(175px, 32vh, 225px); perspective: 650px; }
            .carta-panel .carousel-item-3d { width: clamp(88px, 29vw, 114px); height: clamp(136px, 42vw, 168px); }
            #love-counter .counter-num { font-size: 2rem; }
            #love-counter .counter-word, #love-counter .counter-sep { font-size: 1rem; }
        }

            </style>
</head>
<body>

    <div class="love-container">
        <div class="counter-container">
            <p>Nuestro tiempo juntos...</p>
            <div id="love-counter"></div>
        </div>

        <div class="tree-container">
            <div class="full-tree-wrapper">
                <canvas id="love-tree-canvas" width="1100" height="680"></canvas>
            </div>
        </div>

        <button class="carta-button" id="carta-button" type="button" aria-label="Abrir carta">
            <span class="carta-inner">
                <svg class="carta-heart" xmlns="http://www.w3.org/2000/svg" version="1.0" viewBox="0 0 1280.000000 1228.000000" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                    <g transform="translate(0.000000,1228.000000) scale(0.100000,-0.100000)" fill="#000000" stroke="none">
                        <path d="M3580 10519 c-418 -47 -855 -233 -1197 -510 -191 -155 -415 -411 -552 -631 -303 -485 -468 -1037 -512 -1713 -76 -1171 375 -2000 1524 -2802 212 -148 408 -273 822 -523 570 -344 790 -490 1082 -717 659 -511 1296 -1213 1537 -1693 29 -58 58 -121 65 -140 l13 -35 18 50 c139 397 809 1167 1560 1795 329 275 617 476 1240 865 743 464 1044 683 1364 995 484 471 737 947 833 1567 24 155 24 661 0 863 -59 490 -166 864 -357 1240 -135 265 -301 491 -511 695 -369 358 -792 567 -1309 647 -133 20 -528 17 -665 -5 -787 -131 -1435 -583 -1911 -1332 -64 -100 -179 -313 -229 -426 l-39 -86 -101 201 c-55 111 -137 260 -182 332 -497 793 -1205 1275 -2008 1364 -105 12 -378 11 -485 -1z"/>
                    </g>
                </svg>
                <span class="carta-label">Carta</span>
            </span>
        </button>

        <div class="carta-panel" id="carta-panel" aria-hidden="true">
            <div class="carta-content">
                <button class="carta-close" id="carta-close" type="button" aria-label="Cerrar carta">&times;</button>

                <div class="carta-body">
                    <div class="text-container">
                        <div class="love-message" id="love-message-text"></div>
                    </div>

                    <div class="carousel-perspective-wrapper">
                        <div class="carousel-container-3d">
                            <div class="carousel-3d" id="imageCarousel">
                                                                <div class="carousel-item-3d">
                                    <img src="1.png" alt="Recuerdo" loading="eager" decoding="async">
                                </div>
                                                                <div class="carousel-item-3d">
                                    <img src="2.png" alt="Recuerdo" loading="eager" decoding="async">
                                </div>
                                                                <div class="carousel-item-3d">
                                    <img src="3.png" alt="Recuerdo" loading="eager" decoding="async">
                                </div>
                                                                <div class="carousel-item-3d">
                                    <img src="4.png" alt="Recuerdo" loading="eager" decoding="async">
                                </div>
                                                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fullscreen-control" id="fullscreen-control">
        <button class="fullscreen-btn" id="fullscreenBtn" type="button" aria-label="Entrar en pantalla completa">
            <svg id="fullscreenEnterIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 5h6v2H7v4H5V5zm12 0h2v6h-2V7h-4V5h4zM5 13h2v4h4v2H5v-6zm12 4v-4h2v6h-6v-2h4z"/>
            </svg>
            <svg id="fullscreenExitIcon" viewBox="0 0 24 24" aria-hidden="true"
                 style="display:none;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:square;stroke-linejoin:round;">
                <path d="M8 3V8H3M16 3V8H21M8 21V16H3M16 21V16H21"/>
            </svg>
        </button>
    </div>

    <div class="music-control" id="music-control">
        <button class="music-btn" id="musicBtn" aria-label="Toggle music">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6zm8-14v14h4V5z"></path></svg>
        </button>
        <div class="volume-control" id="volumeControl">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" aria-label="Volume control">
        </div>
    </div>

        <audio id="backgroundMusic" loop preload="auto">
        <source src="https://cdn.dedicapag.com/file/Laravel-dedicapagV2/music/kzrhNMboAcsXBQQ5_Ed Sheeran - Perfect.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        const CONFIG = {
    startDate: "2024-03-15T20:30",        // fecha de inicio de la relación
    loveText: "Hola mi amor...\r\nTu texto aquí.",  // mensaje principal de adentro de la carta
    clickingPhrases: [
        "Frase 1",
        "Frase 2",
        "Frase 3"
    ],
    heartColors: ['#ff6b6b', '#ffa07a'],   
    clickBurstCount: 7,                    
    animation: { clickFallDuration: 6 },
    clickBurst: {
        distance: { min: 60, max: 90 },
        wind: { min: 250, max: 450 }
    },
    petal: {
        colors: ['#ffc2d1', '#ffb3c6'],    
        frequency: 1000,                   
        duration: { min: 8, max: 12 }
    },
    initialDelay: 800,
    typingSpeed: 45,             
};

        const fullscreenBtn       = document.getElementById("fullscreenBtn");
        const fullscreenEnterIcon = document.getElementById("fullscreenEnterIcon");
        const fullscreenExitIcon  = document.getElementById("fullscreenExitIcon");

        function getFullscreenElement() {
            return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement || null;
        }
        function isFullscreenSupported() {
            return Boolean(document.fullscreenEnabled || document.webkitFullscreenEnabled || document.msFullscreenEnabled ||
                document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || document.documentElement.msRequestFullscreen);
        }
        function syncFullscreenButtonState() {
            if (!fullscreenBtn || !fullscreenEnterIcon || !fullscreenExitIcon) return;
            const active = !!getFullscreenElement();
            fullscreenEnterIcon.style.display = active ? "none" : "block";
            fullscreenExitIcon.style.display  = active ? "block" : "none";
            const label = active ? "Salir de pantalla completa" : "Entrar en pantalla completa";
            fullscreenBtn.setAttribute("aria-label", label);
            fullscreenBtn.title = label;
        }
        async function toggleFullscreen() {
            const activeElement = getFullscreenElement();
            try {
                if (activeElement) {
                    const exitFn = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
                    if (exitFn) await exitFn.call(document);
                } else {
                    const requestFn = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || document.documentElement.msRequestFullscreen;
                    if (requestFn) await requestFn.call(document.documentElement);
                }
            } catch (error) {
                console.error("No se pudo cambiar el modo de pantalla completa:", error?.message || error);
            } finally {
                syncFullscreenButtonState();
            }
        }
        function initFullscreenControl() {
            const fullscreenControl = document.getElementById("fullscreen-control");
            if (!fullscreenBtn || !fullscreenControl) return;
            if (!isFullscreenSupported()) { fullscreenControl.style.display = "none"; return; }
            syncFullscreenButtonState();
            fullscreenBtn.addEventListener("click", function(event) { event.stopPropagation(); toggleFullscreen(); });
            document.addEventListener("fullscreenchange", syncFullscreenButtonState);
            document.addEventListener("webkitfullscreenchange", syncFullscreenButtonState);
            document.addEventListener("msfullscreenchange", syncFullscreenButtonState);
        }

        function setupMusicControls() {
            const musicControl  = document.querySelector(".music-control");
            const music         = document.getElementById("backgroundMusic");
            const musicBtn      = document.getElementById("musicBtn");
            const playIcon      = document.getElementById("playIcon");
            const pauseIcon     = document.getElementById("pauseIcon");
            const volumeSlider  = document.getElementById("volumeSlider");
            const volumeControl = document.getElementById("volumeControl");

            if (!musicControl || !music || !musicBtn || !volumeSlider || !volumeControl || !playIcon || !pauseIcon) {
                return { revealAndPlay: function() {} };
            }

            let hideVolumeTimeout = null;
            let hasRevealed = false;
            const setPlayingUi = (isPlaying) => {
                playIcon.style.display  = isPlaying ? "none" : "block";
                pauseIcon.style.display = isPlaying ? "block" : "none";
            };
            const revealControl = () => { if (!hasRevealed) { musicControl.classList.add("is-visible"); hasRevealed = true; } };
            const playMusic = () => music.play().then(() => setPlayingUi(true)).catch(() => setPlayingUi(false));

            music.volume = Number(volumeSlider.value);
            music.load();
            setPlayingUi(false);

            const scheduleHideVolume = () => { clearTimeout(hideVolumeTimeout); hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove("visible"), 2000); };

            musicBtn.addEventListener("click", (e) => {
                e.stopPropagation(); revealControl();
                if (music.paused) { playMusic(); } else { music.pause(); setPlayingUi(false); }
                if (!volumeControl.classList.contains("visible")) { volumeControl.classList.add("visible"); scheduleHideVolume(); }
                else { volumeControl.classList.remove("visible"); clearTimeout(hideVolumeTimeout); }
            });
            volumeSlider.addEventListener("input",   (e) => { music.volume = Number(e.target.value); volumeControl.classList.add("visible"); clearTimeout(hideVolumeTimeout); });
            volumeSlider.addEventListener("change",  scheduleHideVolume);
            volumeControl.addEventListener("mouseenter", () => clearTimeout(hideVolumeTimeout));
            volumeControl.addEventListener("mouseleave", scheduleHideVolume);
            volumeSlider.addEventListener("touchstart", (e) => { e.stopPropagation(); clearTimeout(hideVolumeTimeout); });
            volumeSlider.addEventListener("touchend",   scheduleHideVolume);
            document.addEventListener("click", (e) => { if (!volumeControl.contains(e.target) && !musicBtn.contains(e.target)) { volumeControl.classList.remove("visible"); clearTimeout(hideVolumeTimeout); } });
            music.addEventListener("play",  () => setPlayingUi(true));
            music.addEventListener("pause", () => setPlayingUi(false));
            music.addEventListener("error", () => setPlayingUi(false));

            return { revealAndPlay: function() { revealControl(); if (music.paused) playMusic(); } };
        }

        function initCarousel() {
            const carousel = document.getElementById('imageCarousel'); if (!carousel) return;
            const MIN_ITEMS = 10;
            const origItems = Array.from(carousel.querySelectorAll('.carousel-item-3d'));
            if (origItems.length > 0 && origItems.length < MIN_ITEMS) {
                let i = 0;
                while (carousel.querySelectorAll('.carousel-item-3d').length < MIN_ITEMS) {
                    const clone = origItems[i % origItems.length].cloneNode(true);
                    carousel.appendChild(clone);
                    i++;
                }
            }
            const items = carousel.querySelectorAll('.carousel-item-3d');
            carousel.classList.remove('is-ready');

            items.forEach((item) => {
                const img = item.querySelector('img');
                if (!img) { item.classList.add('is-loaded'); return; }
                img.loading = 'eager'; img.decoding = 'async';
                if (img.complete && img.naturalWidth > 0) { item.classList.add('is-loaded'); return; }
                img.addEventListener('load',  () => item.classList.add('is-loaded'), { once: true });
                img.addEventListener('error', () => item.classList.add('is-loaded'), { once: true });
            });

            let radius, isDragging = false, startX = 0, currentRotation = 0, targetRotation = 0, autoRotateTimeout, animationFrameId;
            const angle = 360 / items.length;
            const updateRadius = () => { const firstItem = items[0]; const itemWidth = firstItem ? firstItem.getBoundingClientRect().width : 180; const gap = window.innerWidth <= 480 ? 25 : 30; radius = (itemWidth + gap) / (2 * Math.sin(Math.PI / items.length)); };
            const arrangeItems = () => { updateRadius(); items.forEach((item, index) => { item.style.transform = `rotateY(${angle * index}deg) translateZ(${radius}px)`; }); };
            const dragStart = (e) => { isDragging = true; startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX; carousel.style.transition = 'none'; };
            const dragging  = (e) => { if (!isDragging) return; const currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX; const sensitivity = window.innerWidth <= 850 ? 0.7 : 0.5; targetRotation = currentRotation + (currentX - startX) * sensitivity; carousel.style.transform = `rotateY(${targetRotation}deg)`; };
            const dragEnd   = () => { if (!isDragging) return; isDragging = false; carousel.style.transition = 'transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; currentRotation = targetRotation; startAutoRotate(); };
            let isPaused = false;
            const animateRotation = () => { if (isDragging || isPaused) { animationFrameId = requestAnimationFrame(animateRotation); return; } targetRotation -= 0.15; currentRotation -= 0.15; carousel.style.transform = `rotateY(${targetRotation}deg)`; animationFrameId = requestAnimationFrame(animateRotation); };
            const stopAutoRotate  = () => { if (animationFrameId) cancelAnimationFrame(animationFrameId); clearTimeout(autoRotateTimeout); };
            const startAutoRotate = () => { stopAutoRotate(); animationFrameId = requestAnimationFrame(animateRotation); };

            carousel.addEventListener('mouseenter', () => { isPaused = true; });
            carousel.addEventListener('mouseleave', () => { isPaused = false; });
            carousel.addEventListener('mousedown', dragStart); document.addEventListener('mousemove', dragging); document.addEventListener('mouseup', dragEnd);
            carousel.addEventListener('touchstart', dragStart, { passive: true }); carousel.addEventListener('touchmove', dragging, { passive: true }); carousel.addEventListener('touchend', dragEnd);
            arrangeItems();
            requestAnimationFrame(() => { carousel.classList.add('is-ready'); startAutoRotate(); });
            window.addEventListener('resize', arrangeItems);
        }

        function initLoveTree(onTreeReady, onSeedTap) {
            var canvas = $('#love-tree-canvas');
            if (!canvas.length || !canvas[0].getContext) { if (typeof onTreeReady === "function") onTreeReady(); return; }

            var width = 1100, height = 680;
            var isMobile = window.matchMedia("(max-width: 768px)").matches;
            canvas.attr("width", width); canvas.attr("height", height);

            var baseBranch = [[535,680,570,250,500,200,30,100,[[540,500,455,417,340,400,13,100,[[450,435,434,430,394,395,2,40]]],[550,445,600,356,680,345,12,100,[[578,400,648,409,661,426,3,80]]],[539,281,537,248,534,217,3,40],[546,397,413,247,328,244,9,80,[[427,286,383,253,371,205,2,40],[498,345,435,315,395,330,4,60]]],[546,357,608,252,678,221,6,100,[[590,293,646,277,648,271,2,80]]]]]];
            var opts = { seed: { x: width/2-20, color: "rgb(190,26,37)", scale: isMobile ? 2.55 : 2, textScale: isMobile ? 1.55 : 1, text: "Dale Click, Amor" }, branch: baseBranch, bloom: { num: 700, width: 1080, height: 650, radius: 240, centerYOffset: 0, startScale: 0.1, growth: 0.1, maxScale: 1 }, footer: { width: 1200, height: 5, speed: 10 } };

            var tree = new Tree(canvas[0], width, height, opts);
            var seed = tree.seed, foot = tree.footer, hold = 1, seedTapTriggered = false;
            var isDesktop = window.matchMedia("(min-width: 1024px)").matches;

            function pointerPosition(e) {
                var rect = canvas[0].getBoundingClientRect();
                return { x: (e.clientX - rect.left) * (width / rect.width), y: (e.clientY - rect.top) * (height / rect.height) };
            }

            canvas.click(function(e) {
                var pos = pointerPosition(e);
                if (seed.hover(pos.x, pos.y)) {
                    if (!seedTapTriggered) { seedTapTriggered = true; if (typeof onSeedTap === "function") onSeedTap(); }
                    hold = 0; canvas.unbind("click"); canvas.unbind("mousemove"); canvas.removeClass('hand');
                }
            }).mousemove(function(e) { var pos = pointerPosition(e); canvas.toggleClass('hand', seed.hover(pos.x, pos.y)); });

            var seedAnimate = eval(Jscex.compile("async", function() { seed.draw(); while (hold) { $await(Jscex.Async.sleep(10)); } while (seed.canScale()) { seed.scale(0.95); $await(Jscex.Async.sleep(10)); } while (seed.canMove()) { seed.move(0, 2); foot.draw(); $await(Jscex.Async.sleep(10)); } }));
            var growAnimate = eval(Jscex.compile("async", function() { do { tree.grow(); $await(Jscex.Async.sleep(10)); } while (tree.canGrow()); }));
            var flowAnimate = eval(Jscex.compile("async", function() { do { tree.flower(2); $await(Jscex.Async.sleep(10)); } while (tree.canFlower()); }));
            var moveAnimate = eval(Jscex.compile("async", function() { tree.snapshot("p1",240,0,610,680); while (tree.move("p1",500,0)) { foot.draw(); $await(Jscex.Async.sleep(10)); } foot.draw(); tree.snapshot("p2",500,0,610,680); }));
            var preserveTreeAnimate = eval(Jscex.compile("async", function() { tree.snapshot("tree-static",0,0,width,height); canvas.parent().css("background-image","none"); canvas.css("background","none"); }));
            var jumpAnimate = eval(Jscex.compile("async", function() { while (true) { tree.ctx.clearRect(0,0,width,height); tree.draw("tree-static"); tree.jump(); foot.draw(); $await(Jscex.Async.sleep(25)); } }));
            var runAsync = eval(Jscex.compile("async", function() { $await(seedAnimate()); $await(growAnimate()); $await(flowAnimate()); if (isDesktop) { $await(moveAnimate()); } $await(preserveTreeAnimate()); if (typeof onTreeReady === "function") onTreeReady(); $await(jumpAnimate()); }));
            runAsync().start();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initFullscreenControl();
            const musicControls = setupMusicControls();
            const messageElement    = document.getElementById('love-message-text');
            const counterContainer  = document.querySelector('.counter-container');
            const cartaButton       = document.getElementById('carta-button');
            const cartaPanel        = document.getElementById('carta-panel');
            const cartaClose        = document.getElementById('carta-close');
            const startDate         = new Date(CONFIG.startDate);
            let phraseIndex = 0, hasTypedStarted = false, carouselInitialized = false;

            function formatCounterUnit(value, singular, plural) {
                const word = value === 1 ? singular : plural;
                return `<span class="counter-unit"><span class="counter-num">${value}</span><span class="counter-word">${word}</span></span>`;
            }
            function updateCounter() {
                const now = new Date(), diff = now - startDate;
                const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours   = Math.floor(diff / (1000 * 60 * 60)) % 24;
                const minutes = Math.floor(diff / (1000 * 60)) % 60;
                const seconds = Math.floor(diff / 1000) % 60;
                document.getElementById('love-counter').innerHTML =
                    formatCounterUnit(days, 'dia', 'dias') +
                    formatCounterUnit(hours, 'hora', 'horas') +
                    formatCounterUnit(minutes, 'min', 'min') +
                    formatCounterUnit(seconds, 'seg', 'seg');
            }

            let charIndex = 0;
            function typeWriter() {
                if (charIndex < CONFIG.loveText.length) {
                    messageElement.parentElement.style.opacity = 1;
                    messageElement.innerHTML = CONFIG.loveText.substring(0, charIndex + 1).replace(/\n/g, '<br>') + '<span class="cursor"></span>';
                    charIndex++;
                    setTimeout(typeWriter, CONFIG.typingSpeed);
                } else {
                    messageElement.innerHTML = CONFIG.loveText.replace(/\n/g, '<br>');
                }
            }

            function openCarta() {
                cartaPanel.classList.add('open'); cartaPanel.setAttribute('aria-hidden', 'false'); document.body.style.overflow = 'hidden';
                if (!hasTypedStarted) { typeWriter(); hasTypedStarted = true; }
                if (!carouselInitialized) { initCarousel(); carouselInitialized = true; }
            }
            function closeCarta() { cartaPanel.classList.remove('open'); cartaPanel.setAttribute('aria-hidden', 'true'); document.body.style.overflow = ''; }
            function showUiAfterTreeAnimation() { counterContainer.classList.add('is-visible'); cartaButton.classList.add('is-visible'); }

            cartaButton.addEventListener('click', openCarta);
            cartaClose.addEventListener('click', closeCarta);
            cartaPanel.addEventListener('click', function(event) { if (event.target === cartaPanel) closeCarta(); });
            document.addEventListener('keydown', function(event) { if (event.key === 'Escape' && cartaPanel.classList.contains('open')) closeCarta(); });

            function createHeartElement(colorPalette) {
                const heart = document.createElement('div');
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                const heartSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${color}"/></svg>`;
                heart.style.backgroundImage = `url('data:image/svg+xml;utf8,${encodeURIComponent(heartSVG)}')`;
                return heart;
            }

            document.addEventListener('click', function(event) {
                if (event.target.closest('.carousel-3d, .carta-button, .carta-panel, .music-control, .fullscreen-control')) return;
                const phrase = document.createElement('div');
                phrase.classList.add('floating-phrase');
                phrase.textContent = CONFIG.clickingPhrases[phraseIndex];
                phrase.style.left = `${event.clientX}px`;
                phrase.style.top  = `${event.clientY}px`;
                document.body.appendChild(phrase);
                phraseIndex = (phraseIndex + 1) % CONFIG.clickingPhrases.length;
                setTimeout(() => phrase.remove(), 4000);

                for (let i = 0; i < CONFIG.clickBurstCount; i++) {
                    const heart = createHeartElement(CONFIG.heartColors);
                    heart.classList.add('click-heart');
                    heart.style.left = `${event.clientX}px`; heart.style.top = `${event.clientY}px`;
                    const angle = Math.random() * 2 * Math.PI;
                    const burstDist = Math.random() * (CONFIG.clickBurst.distance.max - CONFIG.clickBurst.distance.min) + CONFIG.clickBurst.distance.min;
                    const windDist  = Math.random() * (CONFIG.clickBurst.wind.max  - CONFIG.clickBurst.wind.min)  + CONFIG.clickBurst.wind.min;
                    heart.style.setProperty('--burst-x', `${Math.cos(angle) * burstDist}px`);
                    heart.style.setProperty('--burst-y', `${Math.sin(angle) * burstDist}px`);
                    heart.style.setProperty('--wind-x',  `${windDist}px`);
                    heart.style.setProperty('--fall-duration', `${CONFIG.animation.clickFallDuration}s`);
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), CONFIG.animation.clickFallDuration * 1000);
                }
            });

            function createPetal() {
                const petal = createHeartElement(CONFIG.petal.colors); petal.classList.add('petal');
                const startX = Math.random() * 30 - 10; const endX = startX + (Math.random() * 50 + 30);
                petal.style.setProperty('--start-x', `${startX}vw`); petal.style.setProperty('--end-x', `${endX}vw`);
                petal.style.left = '0';
                const duration = Math.random() * (CONFIG.petal.duration.max - CONFIG.petal.duration.min) + CONFIG.petal.duration.min;
                petal.style.animationDuration = duration + 's';
                document.body.appendChild(petal); setTimeout(() => petal.remove(), duration * 1000);
            }
            setTimeout(() => { setInterval(createPetal, CONFIG.petal.frequency); }, CONFIG.initialDelay);

            updateCounter(); setInterval(updateCounter, 1000);
            initLoveTree(showUiAfterTreeAnimation, function() { musicControls.revealAndPlay(); });
        });
    </script>
